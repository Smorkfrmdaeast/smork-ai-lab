<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK AI LAB – AI Tool Interface</title>

<!-- React UMD CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Styles -->
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0a0f2c;
  color: #fff;
  transition: 0.4s;
}
.dark { background: #0a0f2c; color: #fff; }
.light { background: #f5f7fa; color: #111; }

.container { max-width: 480px; margin: 0 auto; padding: 20px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

h1 { font-size: 1.6rem; }

button {
  border: none;
  border-radius: 10px;
  padding: 10px 16px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
}

button:hover { transform: scale(1.05); }

.toggle { background: #00e0ff; color: #0a0f2c; }

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(8px);
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
  transition: 0.3s;
}

.card:hover { transform: scale(1.02); }

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-bottom: 10px;
}

.transaction { display: flex; justify-content: space-between; padding: 10px; border-radius: 10px; margin-bottom: 8px; }
.credit { background: rgba(0,255,128,0.1); color: #0f0; }
.debit { background: rgba(255,0,0,0.1); color: #f00; }

.navbar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  max-width: 480px;
  display: flex;
  justify-content: space-around;
  background: rgba(0,0,0,0.7);
  padding: 12px 0;
  border-top-left-radius: 15px;
  border-top-right-radius: 15px;
}

.nav-item { text-align: center; cursor: pointer; }
.nav-item.active { color: #00e0ff; font-weight: bold; }

.send-btn { background: #00e0ff; color: #0a0f2c; width: 100%; margin-top: 10px; }
.cancel-btn { background: #ff3f3f; color: #fff; width: 100%; margin-top: 10px; }

.result-card {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 10px;
  margin-top: 10px;
  min-height: 50px;
}
</style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
  const [theme, setTheme] = useState("dark");
  const [screen, setScreen] = useState("home");
  const [wallet, setWallet] = useState(1000);
  const [amount, setAmount] = useState("");
  const [transactions, setTransactions] = useState([]);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");

  // Toggle theme
  const toggleTheme = () => {
    const newTheme = theme === "dark" ? "light" : "dark";
    setTheme(newTheme);
    document.body.className = newTheme;
  }

  // Handle send money
  const handleSend = () => {
    const amt = parseFloat(amount);
    if(isNaN(amt) || amt <= 0) return alert("Enter valid amount");
    if(amt > wallet) return alert("Insufficient funds");

    setWallet(wallet - amt);
    setTransactions([{ type:"debit", text:`Sent ₦${amt}` }, ...transactions]);
    setAmount("");
    alert("Money sent successfully!");
    setScreen("home");
  }

  // Handle add money
  const handleAdd = () => {
    const amt = parseFloat(amount);
    if(isNaN(amt) || amt <= 0) return alert("Enter valid amount");

    setWallet(wallet + amt);
    setTransactions([{ type:"credit", text:`Added ₦${amt}` }, ...transactions]);
    setAmount("");
    alert("Money added successfully!");
    setScreen("home");
  }

  // Handle AI Chat (placeholder for real API)
  const handleAI = () => {
    if(!input.trim()) return;
    const userMsg = { type:"user", text: input };
    setMessages([...messages, userMsg]);
    setInput("");
    // Placeholder simulated AI response
    setTimeout(() => {
      const aiMsg = { type:"ai", text: "This is a simulated AI response. Replace with real API call." };
      setMessages(prev => [...prev, aiMsg]);
    }, 800);
  }

  return (
    <div className="container">
      <header>
        <h1>SMORK AI LAB</h1>
        <button className="toggle" onClick={toggleTheme}>{theme==="dark"?"☀ Light":"🌙 Dark"}</button>
      </header>

      {screen === "home" && (
        <>
          <div className="card">
            <h3>Wallet Balance</h3>
            <p>₦{wallet}</p>
          </div>

          <div className="card">
            <button onClick={()=>setScreen("send")}>Send Money</button>
            <button onClick={()=>setScreen("add")}>Add Money</button>
            <button onClick={()=>setScreen("ai")}>AI Chat</button>
          </div>

          <h3>Transactions</h3>
          {transactions.length === 0 && <p>No transactions yet.</p>}
          {transactions.map((t,i)=>(
            <div key={i} className={`transaction ${t.type}`}>{t.text}</div>
          ))}
        </>
      )}

      {screen === "send" && (
        <div className="card">
          <h3>Send Money</h3>
          <input type="number" placeholder="Amount" value={amount} onChange={e=>setAmount(e.target.value)} />
          <button className="send-btn" onClick={handleSend}>Confirm</button>
          <button className="cancel-btn" onClick={()=>setScreen("home")}>Cancel</button>
        </div>
      )}

      {screen === "add" && (
        <div className="card">
          <h3>Add Money</h3>
          <input type="number" placeholder="Amount" value={amount} onChange={e=>setAmount(e.target.value)} />
          <button className="send-btn" onClick={handleAdd}>Add</button>
          <button className="cancel-btn" onClick={()=>setScreen("home")}>Cancel</button>
        </div>
      )}

      {screen === "ai" && (
        <div className="card">
          <h3>AI Chat</h3>
          <div style={{maxHeight:"200px", overflowY:"auto", marginBottom:"10px"}}>
            {messages.map((m,i)=>(
              <div key={i} style={{textAlign:m.type==="user"?"right":"left"}}>
                <div className="result-card">{m.text}</div>
              </div>
            ))}
          </div>
          <input placeholder="Ask AI..." value={input} onChange={e=>setInput(e.target.value)} />
          <button className="send-btn" onClick={handleAI}>Send</button>
          <button className="cancel-btn" onClick={()=>setScreen("home")}>Back</button>
        </div>
      )}

      <nav className="navbar">
        <div className={`nav-item ${screen==="home"?"active":""}`} onClick={()=>setScreen("home")}>Home</div>
        <div className={`nav-item ${screen==="send"?"active":""}`} onClick={()=>setScreen("send")}>Send</div>
        <div className={`nav-item ${screen==="add"?"active":""}`} onClick={()=>setScreen("add")}>Add</div>
        <div className={`nav-item ${screen==="ai"?"active":""}`} onClick={()=>setScreen("ai")}>AI</div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
