    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMORK AI LAB 🚀</title>
<meta name="description" content="SMORK AI LAB – Modern AI tool interface with Chatbot, Text Generator, and Prompt Builder built with futuristic SaaS UI.">

<!-- React & Babel -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ---------------- Base ---------------- */
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Poppins', sans-serif; }
body { background:#0A0F2C; color:#fff; transition:0.4s; }
.light { background:#f5f5f5; color:#111; }
.container { max-width: 500px; margin:auto; padding:20px; }

/* ---------------- Hero ---------------- */
.hero { text-align:center; padding:40px 20px; background: linear-gradient(135deg,#0f3460,#16213e); border-radius:20px; box-shadow:0 0 20px rgba(0,224,255,0.4); overflow:hidden; }
.hero h1 { font-size:1.8rem; margin-bottom:10px; color:#00e0ff; }
.hero p { font-size:1rem; margin-bottom:20px; color:#c0f7ff; }
.cta { background:#00e0ff; color:#000; border:none; padding:12px 25px; border-radius:12px; font-weight:bold; cursor:pointer; transition:0.3s; }
.cta:hover { background:#00c0ff; transform:scale(1.05); }

/* ---------------- Dashboard ---------------- */
.dashboard { display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:20px; }
.card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding:15px; border-radius:15px; text-align:center; cursor:pointer; transition:0.3s; box-shadow:0 0 15px rgba(0,224,255,0.2); }
.card:hover { transform: scale(1.05); box-shadow:0 0 25px rgba(0,224,255,0.5); }
.card h3 { margin-bottom:10px; font-size:1rem; }
.card p { font-size:0.85rem; color:#c0f7ff; }

/* ---------------- Chat ---------------- */
.chat-container { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius:20px; padding:15px; margin-top:20px; max-height:300px; overflow-y:auto; display:flex; flex-direction:column; }
.message { margin:10px 0; padding:10px 15px; border-radius:20px; max-width:80%; position:relative; animation: fadeIn 0.5s; }
.message.user { background: #00e0ff; color:#000; align-self:flex-end; margin-left:auto; }
.message.ai { background: #1c2440; color:#fff; align-self:flex-start; }
@keyframes fadeIn { from {opacity:0; transform:translateY(10px);} to {opacity:1; transform:translateY(0);} }

/* ---------------- Input ---------------- */
.chat-input { display:flex; gap:10px; margin-top:10px; }
.chat-input input { flex:1; padding:10px 15px; border-radius:15px; border:none; outline:none; background: rgba(255,255,255,0.1); color:#fff; }
.chat-input button { padding:10px 15px; border:none; border-radius:15px; background:#00e0ff; color:#000; font-weight:bold; cursor:pointer; transition:0.3s; }
.chat-input button:hover { background:#00c0ff; transform:scale(1.05); }

/* ---------------- Dark/Light Toggle ---------------- */
.toggle { padding:8px 12px; border:none; border-radius:12px; cursor:pointer; background:#00e0ff; color:#000; font-weight:bold; margin-bottom:20px; }

/* ---------------- Footer ---------------- */
footer { margin-top:40px; text-align:center; font-size:0.8rem; color:#c0f7ff; }

/* ---------------- Responsive ---------------- */
@media (max-width:500px){ .dashboard{grid-template-columns:1fr 1fr; gap:10px;} }
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

function App() {
  const [theme,setTheme] = useState("dark");
  const [activeTool,setActiveTool] = useState("home");
  const [messages,setMessages] = useState([]);
  const [input,setInput] = useState("");
  const chatRef = useRef(null);

  useEffect(()=>{ document.body.className=theme; },[theme]);
  useEffect(()=>{ chatRef.current?.scrollTo(0,chatRef.current.scrollHeight); },[messages]);

  const handleSend = async () => {
    if(!input.trim()) return;
    const userMsg = { type:"user", text:input };
    setMessages([...messages,userMsg]);
    setInput("");

    try {
      const res = await fetch(`https://<YOUR_VERCEL_URL>/api/ai?question=${encodeURIComponent(userMsg.text)}`);
      const data = await res.json();
      setMessages(prev => [...prev, { type:"ai", text: data.answer }]);
    } catch (err) {
      setMessages(prev => [...prev, { type:"ai", text: "⚠️ AI server error" }]);
    }
  };

  return (
    <div className="container">
      <button className="toggle" onClick={()=>setTheme(theme==="dark"?"light":"dark")}>
        {theme==="dark"?"🌙 DARK":"☀ LIGHT"}
      </button>

      {/* HERO */}
      {activeTool==="home" && (
        <div className="hero">
          <h1>Build Faster with AI Tools</h1>
          <p>Generate text, prompts, and interact with AI assistants seamlessly.</p>
          <button className="cta" onClick={()=>setActiveTool("dashboard")}>Try AI Tools</button>
        </div>
      )}

      {/* DASHBOARD */}
      {activeTool==="dashboard" && (
        <div className="dashboard">
          <div className="card" onClick={()=>setActiveTool("chat")}>
            <h3>AI Chatbot</h3>
            <p>Interact with AI in real-time</p>
          </div>
          <div className="card" onClick={()=>setActiveTool("textgen")}>
            <h3>Text Generator</h3>
            <p>Generate AI text for any topic</p>
          </div>
          <div className="card" onClick={()=>setActiveTool("prompt")}>
            <h3>Prompt Generator</h3>
            <p>Create high-quality prompts easily</p>
          </div>
          <div className="card">
            <h3>Coming Soon</h3>
            <p>More AI tools</p>
          </div>
        </div>
      )}

      {/* CHAT */}
      {activeTool==="chat" && (
        <>
          <div className="chat-container" ref={chatRef}>
            {messages.map((m,i)=>(
              <div key={i} className={`message ${m.type}`}>{m.text}</div>
            ))}
          </div>
          <div className="chat-input">
            <input placeholder="Type your message..." value={input} onChange={e=>setInput(e.target.value)} />
            <button onClick={handleSend}>Send</button>
          </div>
        </>
      )}

      {/* TEXT GENERATOR */}
      {activeTool==="textgen" && (
        <div className="dashboard">
          <div className="card" style={{gridColumn:"span 2"}}>
            <h3>Text Generator Tool</h3>
            <p>Enter a prompt and generate AI-style text (simulated)</p>
          </div>
        </div>
      )}

      {/* PROMPT GENERATOR */}
      {activeTool==="prompt" && (
        <div className="dashboard">
          <div className="card" style={{gridColumn:"span 2"}}>
            <h3>Prompt Generator Tool</h3>
            <p>Build creative prompts easily (simulated)</p>
          </div>
        </div>
      )}

      <footer>
        SMORK AI LAB 🚀 | Portfolio Demo | Frontend Practice
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
