<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SMORK AI LAB</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
}

body{
background:#0b0f19;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* Header */

header{
padding:18px 24px;
background:#111827;
border-bottom:1px solid #1f2937;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:18px;
font-weight:600;
letter-spacing:1px;
}

.logo{
color:#3b82f6;
}

.links a{
margin-left:18px;
text-decoration:none;
color:#9ca3af;
font-size:14px;
}

.links a:hover{
color:white;
}

/* Chat container */

.chat-wrapper{
flex:1;
display:flex;
flex-direction:column;
max-width:900px;
margin:auto;
width:100%;
padding:20px;
}

/* Messages */

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:16px;
padding-bottom:20px;
}

.message{
max-width:75%;
padding:14px 16px;
border-radius:12px;
font-size:15px;
line-height:1.5;
animation:fade .25s ease;
}

.user{
align-self:flex-end;
background:#2563eb;
}

.ai{
align-self:flex-start;
background:#1f2937;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* Input */

.input-area{
display:flex;
gap:10px;
border-top:1px solid #1f2937;
padding-top:15px;
}

input{
flex:1;
padding:14px;
border-radius:10px;
border:none;
background:#111827;
color:white;
font-size:15px;
}

input:focus{
outline:1px solid #3b82f6;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
font-weight:600;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

/* Footer */

footer{
text-align:center;
padding:12px;
font-size:12px;
color:#6b7280;
border-top:1px solid #1f2937;
}

.typing{
font-size:13px;
color:#9ca3af;
}

</style>
</head>

<body>

<header>

<h1 class="logo">SMORK AI LAB</h1>

<div class="links">
<a href="#">GitHub</a>
<a href="#">LinkedIn</a>
<a href="#">Instagram</a>
</div>

</header>

<div class="chat-wrapper">

<div id="messages" class="messages">

<div class="message ai">
Welcome to <b>SMORK AI LAB</b> 🤖<br>
Ask beginner coding questions like:<br><br>
• What is HTML<br>
• What is CSS<br>
• What is JavaScript<br>
• What is React
</div>

</div>

<div class="typing" id="typing"></div>

<div class="input-area">

<input id="question" placeholder="Ask a coding question..." />

<button onclick="sendQuestion()">Send</button>

</div>

</div>

<footer>

POWERED BY SMORK'S TECH ⚡

</footer>

<script>

const messages = document.getElementById("messages")
const input = document.getElementById("question")
const typing = document.getElementById("typing")

function addMessage(text, type){

const msg = document.createElement("div")
msg.className = `message ${type}`
msg.innerText = text

messages.appendChild(msg)
messages.scrollTop = messages.scrollHeight

}

async function sendQuestion(){

const question = input.value.trim()

if(!question) return

addMessage(question,"user")

input.value=""

typing.innerText="SMORK AI is thinking..."

try{

const res = await fetch(`/api/ai?question=${encodeURIComponent(question)}`)

const data = await res.json()

typing.innerText=""

addMessage(data.answer,"ai")

}catch(err){

typing.innerText=""

addMessage("Server error.","ai")

}

}

input.addEventListener("keypress",function(e){
if(e.key==="Enter") sendQuestion()
})

</script>

</body>
</html>
